<div class="technology-tabs" role="tablist">
  <button
    *ngFor="let tech of technologies; let i = index"
    class="technology-tabs__button"
    [class.is-active]="i === activeIndex"
    (click)="selectTab(i)"
    aria-label="Technology navigation"
    role="tab"
  >
    {{ i + 1 }}
  </button>
</div>
